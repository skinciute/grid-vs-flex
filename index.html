<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid vs Flexbox</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="grid">
      <div class="item-g">1</div>
      <div class="item-g">2</div>
      <div class="item-g">3</div>
      <div class="item-g">4</div>
    </section>

    <section class="flex">
      <div class="left">
        <div class="item-f">1</div>
      </div>
      <div class="right">
        <div class="item-f">2</div>
        <div class="item-f">3</div>
        <div class="item-f">4</div>
      </div>
    </section>
  </body>
</html>
